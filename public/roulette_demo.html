<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClawRoulette Wheel Demo</title>
<style>
  body { background: #fdf8ff; display: flex; gap: 40px; padding: 30px; font-family: sans-serif; align-items: flex-start; flex-wrap: wrap; }
  .demo { text-align: center; }
  h2 { color: #4A4A6A; }
  .info { font-size: 12px; color: #666; margin-top: 8px; }
</style>
</head>
<body>
<script>
const WHEEL_ORDER = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
const RED_NUMBERS = new Set([1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36]);

function getColor(n) { if (n===0) return 'green'; return RED_NUMBERS.has(n) ? 'red' : 'black'; }

function drawWheel(svgId, rotation, highlightIdx) {
  const svg = document.getElementById(svgId);
  const size = 240, center = 120, radius = 115, innerR = 22;
  const SLICES = 37, SLICE_DEG = 360/37;
  
  function polar(angle, r) {
    const rad = angle * Math.PI / 180;
    return { x: center + r * Math.sin(rad), y: center - r * Math.cos(rad) };
  }
  
  let html = `<defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#C0392B"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A4A5A"/><stop offset="100%" stop-color="#1A1A2A"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#27AE60"/><stop offset="100%" stop-color="#145A32"/>
    </radialGradient>
  </defs>`;
  
  // Outer ring
  html += `<circle cx="${center}" cy="${center}" r="${radius+4}" fill="none" stroke="#2D1B4E" stroke-width="8"/>`;
  
  const wheelGroup = `transform="rotate(${rotation}, ${center}, ${center})"`;
  html += `<g ${wheelGroup}>`;
  
  // Slices
  WHEEL_ORDER.forEach((num, idx) => {
    const color = getColor(num);
    const fill = color === 'red' ? 'url(#rg)' : color === 'black' ? 'url(#bg)' : 'url(#gg)';
    const sa = idx * SLICE_DEG, ea = (idx+1) * SLICE_DEG;
    const s = polar(sa, radius), e = polar(ea, radius);
    const si = polar(sa, innerR), ei = polar(ea, innerR);
    const la = SLICE_DEG > 180 ? 1 : 0;
    const stroke = highlightIdx === idx ? '#FFD700' : 'rgba(255,255,255,0.12)';
    const sw = highlightIdx === idx ? 2 : 0.5;
    html += `<path d="M ${si.x} ${si.y} L ${s.x} ${s.y} A ${radius} ${radius} 0 ${la} 1 ${e.x} ${e.y} L ${ei.x} ${ei.y} A ${innerR} ${innerR} 0 ${la} 0 ${si.x} ${si.y} Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" opacity="0.92"/>`;
    
    // Number label
    const mid = polar((idx+0.5)*SLICE_DEG, radius*0.72);
    const labelColor = color === 'black' ? '#E0E0E0' : '#FFFFFF';
    html += `<text x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="middle" fill="${labelColor}" font-size="8" font-weight="bold" transform="rotate(${(idx+0.5)*SLICE_DEG}, ${mid.x}, ${mid.y})">${num}</text>`;
    
    // Separator
    const sp = polar(sa, radius), ip = polar(sa, innerR);
    html += `<line x1="${ip.x}" y1="${ip.y}" x2="${sp.x}" y2="${sp.y}" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>`;
  });
  
  // Center
  html += `<circle cx="${center}" cy="${center}" r="${innerR}" fill="#1A1A2A" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
  html += `</g>`;
  
  // Pointer
  html += `<polygon points="${center},${center-radius-2} ${center-8},${center-radius+12} ${center+8},${center-radius+12}" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>`;
  
  // Landed number badge
  if (highlightIdx !== null) {
    const landedNum = WHEEL_ORDER[highlightIdx];
    const landedColor = getColor(landedNum);
    const bgColor = landedColor === 'red' ? '#C0392B' : landedColor === 'black' ? '#1A1A2A' : '#145A32';
    html += `<circle cx="${center}" cy="${center}" r="18" fill="${bgColor}" stroke="#FFD700" stroke-width="2"/>`;
    html += `<text x="${center}" y="${center}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="13" font-weight="bold">${landedNum}</text>`;
  }
  
  svg.innerHTML = html;
}

// Wheel at rest (idle state)
document.write(`<div class="demo">
  <h2>🎡 ClawRoulette Wheel</h2>
  <svg id="w1" width="240" height="240"></svg>
  <div class="info">37 pockets: 18 red · 18 black · 1 green (0)<br>European single-zero layout</div>
</div>`);

// Wheel showing "ball landed on 32 (red)" - a win for red bet
document.write(`<div class="demo">
  <h2>🔴 Ball on Red (32)</h2>
  <svg id="w2" width="240" height="240"></svg>
  <div class="info">Result: RED wins! Bet RED → You Won ✨<br>Ball lands at pocket 1 (number 32)</div>
</div>`);

// Wheel showing "ball landed on 15 (black)" - a loss for red bet  
document.write(`<div class="demo">
  <h2>⚫ Ball on Black (15)</h2>
  <svg id="w3" width="240" height="240"></svg>
  <div class="info">Result: BLACK wins! Bet RED → You Lost<br>Ball lands at pocket 2 (number 15)</div>
</div>`);

// Wheel showing green zero
document.write(`<div class="demo">
  <h2>🟢 Ball on Green (0)</h2>
  <svg id="w4" width="240" height="240"></svg>
  <div class="info">Result: ZERO! Everyone loses<br>Represents 1/37 ≈ 2.7% of wheel</div>
</div>`);

window.onload = function() {
  // Wheel at rest
  drawWheel('w1', 0, null);
  
  // Wheel landed on pocket 1 (number 32, red)
  // Center of pocket 1 is at angle (1+0.5) * (360/37) = 1.5 * 9.73 = 14.59°
  // To get pocket 1 at top, rotate by -14.59 (or equivalently 360-14.59 = 345.41°)
  // But we want visual: rotate wheel so pointer aligns with pocket 1
  const sliceDeg = 360/37;
  const pocketToRotation = (pocketIdx) => {
    // pocket center at (pocketIdx+0.5)*sliceDeg from start
    // to align with pointer (top=0), rotate wheel negatively
    const pocketCenter = (pocketIdx + 0.5) * sliceDeg;
    return 360 - pocketCenter; // wheel rotated so pocketCenter is at top
  };
  
  drawWheel('w2', pocketToRotation(1) + 5*360, 1); // pocket 1 = number 32 (red)
  drawWheel('w3', pocketToRotation(2) + 3*360, 2); // pocket 2 = number 15 (black)
  drawWheel('w4', pocketToRotation(0) + 4*360, 0); // pocket 0 = number 0 (green)
};
</script>
</body>
</html>
